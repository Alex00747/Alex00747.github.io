<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>新用户注册</title>
</head> 

<body>
<form>
  <h1 align="center">新用户注册</h1>
  <p align="center">请输入账号：<input type="text" name="username"/></p >
  <p align="center">请输入密码：<input type="password" name="userpass1"/></p >
  <p align="center">请确认密码：<input type="password" name="userpass2"/></p >
  <p align="center">请选择性别：男<input type="radio" name="xb" value="male"/>&nbsp;&nbsp;&nbsp;&nbsp;
                               女<input type="radio" name="xb" value="female"/></p >
  <p align="center">
    请选择爱好：踢足球<input type="checkbox" name="ah" value="football"/>&nbsp;&nbsp;&nbsp;&nbsp;
               打篮球<input type="checkbox" name="ah" value="basketball"/>&nbsp;&nbsp;&nbsp;&nbsp;
               唱歌<input type="checkbox" name="ah" value="sing"/>&nbsp;&nbsp;&nbsp;&nbsp;
               下棋<input type="checkbox" name="ah" value="chess"/></p >
   <p align="center">请选择专业：
       <select name="major">
          <option>计算机科学与技术</option>
          <option>软件工程</option>
          <option>数据科学与大数据技术</option>
       </select>
   </p >
   <p align="center">
     请自我介绍：<br/>
     <textarea cols="50" rows="10"></textarea>
   </p >
   <p align="center">
      <input type="button" onclick="" value="提交"/>
      <input type="reset" value="重置"/>
   </p >
</form>
</body>
</html>
